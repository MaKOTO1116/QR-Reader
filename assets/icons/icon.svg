<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#grad)" />
  
  <!-- Outer QR box style frame -->
  <g fill="#ffffff">
    <!-- Top-left Finder Pattern -->
    <path d="M80 80h112v112H80zm24 24v64h64v-64z"/>
    <rect x="120" y="120" width="32" height="32"/>

    <!-- Top-right Finder Pattern -->
    <path d="M320 80h112v112H320zm24 24v64h64v-64z"/>
    <rect x="360" y="120" width="32" height="32"/>

    <!-- Bottom-left Finder Pattern -->
    <path d="M80 320h112v112H80zm24 24v64h64v-64z"/>
    <rect x="120" y="360" width="32" height="32"/>

    <!-- Alignment pattern & QR pixels -->
    <rect x="360" y="360" width="48" height="48"/>
    <rect x="320" y="320" width="24" height="24"/>
    <rect x="408" y="320" width="24" height="24"/>
    <rect x="320" y="408" width="24" height="24"/>
    <rect x="240" y="240" width="32" height="32"/>
    <rect x="240" y="120" width="32" height="32"/>
    <rect x="120" y="240" width="32" height="32"/>
    <rect x="240" y="360" width="32" height="32"/>
    <rect x="360" y="240" width="32" height="32"/>
  </g>

  <!-- Highlighting check-in/out green check mark overlay -->
  <g transform="translate(192, 192)">
    <circle cx="64" cy="64" r="72" fill="#10b981" stroke="#ffffff" stroke-width="12"/>
    <!-- Checkmark path -->
    <path d="M38 64 l16 16 l34 -34" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
